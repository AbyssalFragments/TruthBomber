# adapted from internal mgmt bot
name: Build Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: docker
    steps:
      - name: Install Docker CLI
        run: |
          apt-get update
          apt-get install -y docker.io
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0
      - name: Login to Container Registry
        uses: docker/login-action@v3.4.0
        with:
          registry: git.abyssalfragments.org
          username: ${{ env.REGISTRY_USER }}
          password: ${{ env.REGISTRY_PAT }}
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Build and push
        uses: docker/build-push-action@v6.15.0
        with:
          push: true
          file: Dockerfile
          platforms: linux/amd64
          tags: git.abyssalfragments.org/services/truthbomber:latest
      - name: Deploy
        if: contains(env.PORTAINER_WEBHOOK_URL, 'http')
        run: |
          curl -X POST -H "Content-Type: application/json" -d '{"text": "Truth Bomber in route, sir"}' ${PORTAINER_WEBHOOK_URL}
        env:
          PORTAINER_WEBHOOK_URL: ${{ secrets.PORTAINER_WEBHOOK_URL }}